# Basic Settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g mouse on
set -g set-clipboard on

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Vim like pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file $HOME/.config/tmux/tmux.conf

# Change from 0 based to 1 based index to match keyboard layout
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Alt+hjkl to switch panes (vim-style)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n S-Left previous-window
bind -n S-Right next-window

# CyberDyne theme colors
theme_background="#151144"
theme_foreground="#00ff92"
theme_cyan="#6BFFDD"
theme_black="#080808"
theme_gray="#D6FCBA"
theme_magenta="#FF90FE"
theme_pink="#FFC4BE"
theme_red="#FF8373"
theme_green="#00C172"
theme_yellow="#D2A700"
theme_blue="#0071CF"
theme_orange="#FF4D00"
theme_black4="#484848"

# Status Bar
set -g status "on"
set -g status-bg "${theme_background}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${theme_cyan},bg=${theme_gray},align=centre"
set -g message-command-style "fg=${theme_cyan},bg=${theme_gray},align=centre"

# Panes
set -g pane-border-style "fg=${theme_gray}"
set -g pane-active-border-style "fg=${theme_blue}"

# Windows
set -g window-status-activity-style "fg=${theme_foreground},bg=${theme_background},none"
set -g window-status-separator ""
set -g window-status-style "fg=${theme_foreground},bg=${theme_background},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${theme_blue},bg=${theme_background}] #I: #[fg=${theme_magenta},bg=${theme_background}](✓) #[fg=${theme_cyan},bg=${theme_background}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${theme_magenta},bg=${theme_background}]"

# Statusline - other windows
set -g window-status-format "#[fg=${theme_blue},bg=${theme_background}] #I: #[fg=${theme_foreground},bg=${theme_background}]#W"

# Statusline - right side
set -g status-right "#[fg=${theme_blue},bg=${theme_background},nobold,nounderscore,noitalics]#[fg=${theme_background},bg=${theme_blue},nobold,nounderscore,noitalics] #[fg=${theme_foreground},bg=${theme_gray}] #W #{?client_prefix,#[fg=${theme_magenta}],#[fg=${theme_cyan}]}#[bg=${theme_gray}]#{?client_prefix,#[bg=${theme_magenta}],#[bg=${theme_cyan}]}#[fg=${theme_background}] #[fg=${theme_foreground},bg=${theme_gray}] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "${theme_blue}"
set -g mode-style "fg=${theme_blue} bg=${theme_black4} bold"
